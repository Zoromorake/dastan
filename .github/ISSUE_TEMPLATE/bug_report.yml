name: Bug report
description: Something is broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search existing issues first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: When I export to FDX, character names are lowercase...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open a script in the editor
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, and Dastan version or commit if known.
      placeholder: Chrome 131, macOS 15, main @ abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console errors or screenshots
      description: Paste relevant console output or attach screenshots.
    validations:
      required: false
