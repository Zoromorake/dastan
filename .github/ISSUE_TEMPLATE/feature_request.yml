name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution. Feature requests for cloud-only capabilities may belong in the private cloud repo.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this solve for screenwriters?
      placeholder: I often need to duplicate a beat board when starting a new draft...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should Dastan address it?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core editor / local app (AGPL)
        - AI assistant
        - Hub / vault
        - Cloud / collaboration (may defer to dastan-cloud)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false
