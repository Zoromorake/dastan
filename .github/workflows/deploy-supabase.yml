name: Deploy Supabase Functions

# Disabled for now — re-enable by restoring push triggers.
on:
  workflow_dispatch:

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0
      - name: Deploy chat function
        run: supabase functions deploy chat --project-ref lbnkjcxtnguslqoacmua --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
